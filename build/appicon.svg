<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Fluent gradient - Blue accent -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4"/>
      <stop offset="100%" style="stop-color:#005A9E"/>
    </linearGradient>
    
    <!-- Highlight gradient -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Subtle highlight overlay -->
  <rect x="32" y="32" width="448" height="224" rx="96" ry="96" fill="url(#highlightGradient)" clip-path="inset(0 0 50% 0)"/>
  
  <!-- Document/Log icon base -->
  <rect x="120" y="100" width="200" height="260" rx="16" ry="16" fill="white" opacity="0.95"/>
  
  <!-- Log lines -->
  <rect x="150" y="140" width="140" height="12" rx="6" fill="#0078D4" opacity="0.8"/>
  <rect x="150" y="170" width="100" height="12" rx="6" fill="#0078D4" opacity="0.5"/>
  <rect x="150" y="200" width="120" height="12" rx="6" fill="#0078D4" opacity="0.6"/>
  <rect x="150" y="230" width="80" height="12" rx="6" fill="#0078D4" opacity="0.4"/>
  <rect x="150" y="260" width="110" height="12" rx="6" fill="#0078D4" opacity="0.5"/>
  <rect x="150" y="290" width="90" height="12" rx="6" fill="#0078D4" opacity="0.3"/>
  
  <!-- Send arrow / Network connection -->
  <g transform="translate(280, 240)">
    <!-- Arrow circle background -->
    <circle cx="60" cy="60" r="80" fill="white"/>
    <circle cx="60" cy="60" r="70" fill="#0078D4"/>
    
    <!-- Send arrow -->
    <path d="M30 60 L70 60 M55 40 L75 60 L55 80" 
          stroke="white" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
  </g>
  
  <!-- Network dots decoration -->
  <circle cx="400" cy="120" r="8" fill="white" opacity="0.6"/>
  <circle cx="430" cy="150" r="6" fill="white" opacity="0.4"/>
  <circle cx="380" cy="400" r="10" fill="white" opacity="0.5"/>
  <circle cx="420" cy="380" r="6" fill="white" opacity="0.3"/>
</svg>
