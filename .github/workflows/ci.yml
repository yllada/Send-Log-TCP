# =============================================================================
# CI Pipeline - Integración Continua
# =============================================================================
# Este workflow se ejecuta en cada push y PR para validar el código.
# Incluye: tests de Go, linting, validación de builds y análisis estático.
#
# Documentación: https://docs.github.com/en/actions
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

# Cancelar ejecuciones anteriores del mismo workflow en la misma rama
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  # ===========================================================================
  # Job: Análisis de código Go
  # ===========================================================================
  go-analysis:
    name: Go Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  # ===========================================================================
  # Job: Validación del Frontend
  # ===========================================================================
  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: ./frontend
        run: pnpm tsc --noEmit
        continue-on-error: true

      - name: Lint
        working-directory: ./frontend
        run: pnpm lint
        continue-on-error: true

      - name: Build
        working-directory: ./frontend
        run: pnpm build

  # ===========================================================================
  # Job: Validación de Build (Matrix)
  # ===========================================================================
  build-validation:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [go-analysis, frontend-validation]
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            tags: webkit2_41
          - os: windows-latest
            platform: windows/amd64
            tags: ""
          - os: macos-latest
            platform: darwin/universal
            tags: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Linux: Instalar dependencias GTK/WebKit
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libappindicator3-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build application
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            wails build -platform ${{ matrix.platform }} -tags ${{ matrix.tags }}
          else
            wails build -platform ${{ matrix.platform }}
          fi
        shell: bash

      - name: Verify build output
        run: ls -la build/bin/
        shell: bash
