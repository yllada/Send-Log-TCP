name: Build All Platforms

# Trigger: solo cuando se crea un tag de versión
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  # Job para Windows
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails application
        run: wails build -platform windows/amd64

      - name: Rename artifact
        shell: bash
        run: |
          mv build/bin/Sendlog-Syslog.exe build/bin/Sendlog-Syslog-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/Sendlog-Syslog-windows-amd64.exe
          retention-days: 1

  # Job para Linux
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          # Ubuntu 24.04+ usa libwebkit2gtk-4.1-dev
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libappindicator3-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails application
        # El tag webkit2_41 es necesario para Ubuntu 24.04+ que usa webkit2gtk-4.1
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Rename artifact
        run: |
          mv build/bin/Sendlog-Syslog build/bin/Sendlog-Syslog-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/bin/Sendlog-Syslog-linux-amd64
          retention-days: 1

  # Job para crear el release con todos los binarios
  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: ./release

      - name: List release files
        run: ls -la ./release

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: SendLog Syslog ${{ steps.version.outputs.version }}
          body: |
            ## SendLog Syslog ${{ steps.version.outputs.version }}
            
            ### Downloads
            - **Windows**: `Sendlog-Syslog-windows-amd64.exe`
            - **Linux**: `Sendlog-Syslog-linux-amd64`
            
            ### Linux Installation
            ```bash
            chmod +x Sendlog-Syslog-linux-amd64
            ./Sendlog-Syslog-linux-amd64
            ```
            
            ### Requirements
            - **Linux**: GTK3 and WebKitGTK runtime libraries
              ```bash
              # Ubuntu 24.04+
              sudo apt install libgtk-3-0 libwebkit2gtk-4.1-0
              
              # Ubuntu 22.04 y anteriores
              sudo apt install libgtk-3-0 libwebkit2gtk-4.0-37
              ```
          files: |
            ./release/Sendlog-Syslog-windows-amd64.exe
            ./release/Sendlog-Syslog-linux-amd64
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
