# =============================================================================
# Release Pipeline - Generación de Releases Multiplataforma
# =============================================================================
# Este workflow se ejecuta cuando se crea un tag de versión (v*).
# Genera builds para Windows, Linux y macOS, con changelog automático.
#
# Uso:
#   git tag v1.4.0
#   git push origin v1.4.0
#
# Conventional Commits para changelog automático:
#   feat: nueva funcionalidad
#   fix: corrección de bug
#   docs: documentación
#   perf: mejora de rendimiento
#   refactor: refactorización
#   chore: mantenimiento
#
# Documentación:
#   - GitHub Releases: https://docs.github.com/en/repositories/releasing-projects-on-github
#   - Wails Build: https://wails.io/docs/reference/cli#build
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # v1.0.0-beta.1
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.4.0)'
        required: true
        type: string

# Permisos necesarios para crear releases
permissions:
  contents: write
  
env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  APP_NAME: 'Sendlog-Syslog'

jobs:
  # ===========================================================================
  # Job: Preparar Release
  # ===========================================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_short: ${{ steps.version.outputs.version_short }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para changelog

      - name: Get version info
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_short=${VERSION#v}" >> $GITHUB_OUTPUT
          
          # Detectar si es prerelease
          if [[ "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          
          echo "📦 Version: ${VERSION}"

      - name: Generate changelog
        id: changelog
        run: |
          # Obtener el tag anterior
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges HEAD)
          else
            echo "Previous tag: $PREVIOUS_TAG"
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges ${PREVIOUS_TAG}..HEAD)
          fi
          
          # Categorizar commits por tipo (Conventional Commits)
          FEATURES=$(echo "$COMMITS" | grep -E "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^- fix" || true)
          PERF=$(echo "$COMMITS" | grep -E "^- perf" || true)
          DOCS=$(echo "$COMMITS" | grep -E "^- docs" || true)
          REFACTOR=$(echo "$COMMITS" | grep -E "^- refactor" || true)
          CHORE=$(echo "$COMMITS" | grep -E "^- chore" || true)
          OTHER=$(echo "$COMMITS" | grep -vE "^- (feat|fix|perf|docs|refactor|chore)" || true)
          
          # Construir changelog
          CHANGELOG=""
          
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### ✨ New Features\n${FEATURES}\n\n"
          fi
          
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### 🐛 Bug Fixes\n${FIXES}\n\n"
          fi
          
          if [ -n "$PERF" ]; then
            CHANGELOG="${CHANGELOG}### ⚡ Performance\n${PERF}\n\n"
          fi
          
          if [ -n "$REFACTOR" ]; then
            CHANGELOG="${CHANGELOG}### ♻️ Refactoring\n${REFACTOR}\n\n"
          fi
          
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}### 📚 Documentation\n${DOCS}\n\n"
          fi
          
          if [ -n "$CHORE" ]; then
            CHANGELOG="${CHANGELOG}### 🔧 Maintenance\n${CHORE}\n\n"
          fi
          
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}### 📝 Other Changes\n${OTHER}\n\n"
          fi
          
          # Si no hay commits categorizados, listar todos
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="### 📝 Changes\n${COMMITS}\n"
          fi
          
          # Guardar changelog (escapar para multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Job: Build Matrix (Todas las plataformas en paralelo)
  # ===========================================================================
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: prepare
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows AMD64
          - name: Windows
            os: windows-latest
            platform: windows/amd64
            tags: ""
            artifact: Sendlog-Syslog.exe
            output: Sendlog-Syslog-windows-amd64.exe
            
          # Linux AMD64
          - name: Linux
            os: ubuntu-latest
            platform: linux/amd64
            tags: webkit2_41
            artifact: Sendlog-Syslog
            output: Sendlog-Syslog-linux-amd64
            
          # macOS Universal (Intel + Apple Silicon)
          - name: macOS
            os: macos-latest
            platform: darwin/universal
            tags: ""
            artifact: Sendlog-Syslog.app
            output: Sendlog-Syslog-macos-universal.app
            is_app_bundle: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Linux: Instalar dependencias GTK/WebKit
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libappindicator3-dev \
            imagemagick \
            wget \
            file

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build application
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            wails build -platform ${{ matrix.platform }} -tags ${{ matrix.tags }} -ldflags "-X main.Version=${{ needs.prepare.outputs.version }}"
          else
            wails build -platform ${{ matrix.platform }} -ldflags "-X main.Version=${{ needs.prepare.outputs.version }}"
          fi
        shell: bash

      # Renombrar y preparar artefacto
      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows' && !matrix.is_app_bundle
        run: |
          cp "build/bin/${{ matrix.artifact }}" "build/bin/${{ matrix.output }}"
          chmod +x "build/bin/${{ matrix.output }}"

      # Linux: Crear paquetes DEB y AppImage
      - name: Create Linux packages
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ needs.prepare.outputs.version_short }}"
          
          # Crear paquete DEB
          echo "📦 Creating DEB package..."
          chmod +x ./scripts/package-deb.sh
          ./scripts/package-deb.sh "$VERSION"
          
          # Crear AppImage
          echo "📦 Creating AppImage..."
          chmod +x ./scripts/package-appimage.sh
          ./scripts/package-appimage.sh "$VERSION"
          
          # Listar artefactos generados
          echo "📋 Generated packages:"
          ls -la build/bin/
          
      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv "build/bin/${{ matrix.artifact }}" "build/bin/${{ matrix.output }}"

      - name: Prepare macOS app bundle
        if: matrix.is_app_bundle
        run: |
          cd build/bin
          # Crear zip del .app bundle
          zip -r "${{ matrix.output }}.zip" "${{ matrix.artifact }}"
          mv "${{ matrix.output }}.zip" "../${{ matrix.output }}.zip"
        shell: bash

      # Generar checksum
      - name: Generate checksum (Unix)
        if: runner.os != 'Windows' && !matrix.is_app_bundle
        run: |
          cd build/bin
          # Checksum del binario
          sha256sum "${{ matrix.output }}" > "${{ matrix.output }}.sha256"
          
          # Checksums de paquetes Linux
          if [ -f "*.deb" ]; then
            for f in *.deb; do sha256sum "$f" > "$f.sha256"; done
          fi
          if [ -f "*.AppImage" ]; then
            for f in *.AppImage; do sha256sum "$f" > "$f.sha256"; done
          fi
          
      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd build/bin
          $hash = (Get-FileHash "${{ matrix.output }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.output }}" | Out-File -FilePath "${{ matrix.output }}.sha256" -NoNewline
          
      - name: Generate checksum (macOS bundle)
        if: matrix.is_app_bundle
        run: |
          cd build
          sha256sum "${{ matrix.output }}.zip" > "${{ matrix.output }}.zip.sha256"

      # Upload artefactos
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            build/bin/${{ matrix.output }}
            build/bin/${{ matrix.output }}.sha256
            build/bin/*.deb
            build/bin/*.deb.sha256
            build/bin/*.AppImage
            build/bin/*.AppImage.sha256
            build/${{ matrix.output }}.zip
            build/${{ matrix.output }}.zip.sha256
          retention-days: 5
          if-no-files-found: warn

  # ===========================================================================
  # Job: Crear Release de GitHub
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          find ./artifacts -type f -ls

      - name: Prepare release files
        run: |
          mkdir -p release
          find ./artifacts -type f \( -name "*.exe" -o -name "Sendlog-Syslog-linux-*" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          echo "📦 Release files:"
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SendLog Syslog ${{ needs.prepare.outputs.version }}"
          tag_name: ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          generate_release_notes: false
          body: |
            # 🚀 SendLog Syslog ${{ needs.prepare.outputs.version }}
            
            Professional syslog message sender for network testing and monitoring.
            
            ## 📥 Downloads
            
            ### 🪟 Windows
            | File | Description |
            |------|-------------|
            | `Sendlog-Syslog-windows-amd64.exe` | Windows 64-bit executable |
            
            ### 🐧 Linux
            | File | Description |
            |------|-------------|
            | `sendlog-syslog_*.deb` | **Recommended** - Debian/Ubuntu package (auto-installs dependencies) |
            | `Sendlog-Syslog-*-x86_64.AppImage` | Portable AppImage (no installation needed) |
            | `Sendlog-Syslog-linux-amd64` | Raw binary (requires manual dependency installation) |
            
            ### 🍎 macOS
            | File | Description |
            |------|-------------|
            | `Sendlog-Syslog-macos-universal.app.zip` | macOS Universal (Intel + Apple Silicon) |
            
            ## 🔄 Changelog
            
            ${{ needs.prepare.outputs.changelog }}
            
            ## 📋 Installation
            
            <details>
            <summary><b>🪟 Windows</b></summary>
            
            1. Download `Sendlog-Syslog-windows-amd64.exe`
            2. Run the executable
            </details>
            
            <details>
            <summary><b>🐧 Linux - DEB Package (Recommended)</b></summary>
            
            ```bash
            # Download the .deb file, then:
            sudo apt install ./sendlog-syslog_*.deb
            
            # Dependencies are installed automatically!
            # Run from applications menu or:
            sendlog-syslog
            ```
            </details>
            
            <details>
            <summary><b>🐧 Linux - AppImage (Portable)</b></summary>
            
            ```bash
            # Download the AppImage, then:
            chmod +x Sendlog-Syslog-*-x86_64.AppImage
            ./Sendlog-Syslog-*-x86_64.AppImage
            
            # No installation or dependencies needed!
            ```
            </details>
            
            <details>
            <summary><b>🐧 Linux - Raw Binary</b></summary>
            
            ```bash
            # Install dependencies first:
            # Ubuntu 24.04+
            sudo apt install libgtk-3-0 libwebkit2gtk-4.1-0
            
            # Ubuntu 22.04 and earlier
            sudo apt install libgtk-3-0 libwebkit2gtk-4.0-37
            
            # Then run:
            chmod +x Sendlog-Syslog-linux-amd64
            ./Sendlog-Syslog-linux-amd64
            ```
            </details>
            
            <details>
            <summary><b>🍎 macOS</b></summary>
            
            1. Download and unzip `Sendlog-Syslog-macos-universal.app.zip`
            2. Move `Sendlog-Syslog.app` to Applications
            3. Right-click → Open (first time only, to bypass Gatekeeper)
            </details>
            
            ## 🔐 Verify Downloads
            
            ```bash
            # Linux/macOS
            sha256sum -c Sendlog-Syslog-*.sha256
            
            # Windows (PowerShell)
            Get-Content *.sha256 | ForEach-Object {
              $expected = ($_ -split '\s+')[0]
              $file = ($_ -split '\s+')[1]
              $actual = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
              if ($expected -eq $actual) { "✓ $file" } else { "✗ $file" }
            }
            ```
            
            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/...v${{ needs.prepare.outputs.version_short }}
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Job: Actualizar CHANGELOG.md
  # ===========================================================================
  update-changelog:
    name: Update CHANGELOG
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.is_prerelease == 'false'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          
          # Crear entrada del changelog
          ENTRY="## [${VERSION#v}] - ${DATE}\n\n${{ needs.prepare.outputs.changelog }}"
          
          # Insertar después del título principal
          if grep -q "^## \[" CHANGELOG.md; then
            # Insertar antes del primer ## [
            sed -i "0,/^## \[/s//$(echo -e "$ENTRY")\\n\\n## [/" CHANGELOG.md
          else
            # Agregar al final
            echo -e "\n$ENTRY" >> CHANGELOG.md
          fi
          
      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for ${{ needs.prepare.outputs.version }}" || exit 0
          git push
