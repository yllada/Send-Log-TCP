name: Build Windows Release

# Trigger del workflow
on:
  # Se ejecuta cuando haces push a la rama main o creas un tag
  push:
    branches:
      - main
    tags:
      - 'v*'
  # Permite ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:

# Variables de entorno globales
env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    
    steps:
      # 1. Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. Setup Go con cache de dependencias
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      # 3. Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 4. Setup Node.js con cache integrado
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      # 5. Instalar dependencias del frontend
      # El cache se restaura automáticamente por setup-node
      # Solo se ejecuta pnpm install si hay cambios en pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      # 6. Build del frontend (producción)
      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build

      # 7. Instalar Wails CLI
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # 8. Build de la aplicación Wails para Windows
      - name: Build Wails application
        run: wails build -platform windows/amd64

      # 9. Crear nombre del artefacto con timestamp
      - name: Get timestamp
        id: timestamp
        shell: bash
        run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      # 10. Upload del ejecutable como artefacto
      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: Send-Log-TCP-windows-${{ steps.timestamp.outputs.timestamp }}
          path: |
            build/bin/*.exe
          retention-days: 30

      # 11. (Opcional) Crear release si es un tag
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/bin/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
